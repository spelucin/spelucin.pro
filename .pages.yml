media:
  input: public/og
  output: /og

content:
  - name: site
    label: Configuración del sitio
    type: file
    path: src/content/site-seo/index.yaml
    format: yaml
    fields:
      - name: siteName
        type: string
        label: Nombre del sitio
      - name: defaultTitle
        type: string
        label: Título por defecto
      - name: defaultDescription
        type: text
        label: Descripción por defecto
      - name: locale
        type: string
        label: Locale OG (ej. es_MX)
      - name: founderName
        type: string
        label: Nombre (schema Person)
      - name: founderJobTitle
        type: string
        label: Puesto (schema Person)
      - name: email
        type: string
        label: Email de contacto
      - name: sameAs
        type: string
        list: true
        label: Redes sociales / perfiles (sameAs)
      - name: areaServed
        type: string
        list: true
        label: Áreas atendidas

  - name: pages
    label: Páginas
    type: collection
    path: src/content/pages
    format: yaml
    filename: "{primary}.yaml"
    view:
      primary: title
    fields:
      - name: title
        type: string
        label: Título SEO
      - name: description
        type: text
        label: Meta descripción
      - name: image
        type: image
        label: Imagen OG
        folder: public/og
        path: /og

  - name: caseStudies
    label: Casos de estudio
    type: collection
    path: src/content/case-studies
    format: yaml
    subfolders: true
    filename: "{primary}/index.yaml"
    view:
      primary: headline
      sort: timeline
      order: desc
    fields:
      - name: headline
        type: string
        label: Titular (H1)
      - name: shortDescription
        type: text
        label: Descripción corta (para tarjeta)
      - name: cover
        type: image
        label: Imagen de portada
        folder: public/og/case-studies
        path: /og/case-studies
      - name: summary
        type: text
        label: Resumen (subtítulo detalle)
      - name: client
        type: string
        label: Cliente
      - name: platform
        type: string
        label: Plataforma
      - name: industry
        type: string
        label: Industria
      - name: market
        type: string
        label: Mercado
      - name: timeline
        type: string
        label: Duración (ej. 5 meses)
      - name: role
        type: string
        label: Rol
      - name: team
        type: string
        label: Equipo (opcional)
      - name: challenge
        type: text
        label: El desafío
      - name: whatIdid
        type: string
        list: true
        label: Qué hice
      - name: results
        type: object
        list: true
        label: Resultados
        fields:
          - name: value
            type: string
            label: Valor (ej. +43%)
          - name: label
            type: string
            label: Etiqueta (ej. Revenue orgánico)
      - name: whyItWorked
        type: text
        label: Por qué funcionó
      - name: tools
        type: string
        label: Herramientas (separadas por coma)
      - name: serviceSlug
        type: select
        label: Slug del servicio (opcional)
        options:
          - label: Auditoría SEO Técnica
            value: auditoria-seo-tecnica
          - label: Estrategia de Catálogo
            value: estrategia-de-catalogo
          - label: Talleres y Capacitaciones
            value: talleres-y-capacitaciones
      - name: serviceName
        type: string
        label: Nombre del servicio (opcional, mostrado)
      - name: seoTitle
        type: string
        label: Título SEO (override opcional)
      - name: seoDescription
        type: text
        label: Meta descripción (override opcional)
      - name: ogImage
        type: image
        label: Imagen OG (override opcional)
        folder: public/og/case-studies
        path: /og/case-studies
